<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. Belaid Mayada - Neurophysiologie Clinique</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0d1b4b',
            'navy-dark': '#080e24',
            gold: '#b8966e',
            'gold-light': '#d4b896',
            cream: '#faf8f5',
            white: '#ffffff',
            muted: '#6b7280',
          },
          fontFamily: {
            sans: ['"DM Sans"', 'sans-serif'],
            serif: ['"Playfair Display"', 'serif'],
          }
        }
      }
    }
  </script>
  
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #faf8f5; color: #0d1b4b; -webkit-font-smoothing: antialiased; overflow-x: hidden;}
    h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; }
    .glass-nav { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #080e24; }
    ::-webkit-scrollbar-thumb { background: #b8966e; border-radius: 4px; }
    .pulse-glow { animation: pulse 2s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }
  </style>

  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = window.Motion;

    // --- SVGs Services ---
    const svgbg = <circle cx="80" cy="80" r="75" fill="currentColor" fillOpacity="0.03" stroke="none" />;

    const SvgEMG = (props) => (
      <svg viewBox="0 0 160 160" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {svgbg}
        {/* Muscle shape: oval with tapers */}
        <path d="M45,80 C60,40 100,40 115,80 C100,120 60,120 45,80 Z" fill="currentColor" fillOpacity="0.08" stroke="none" />
        <path d="M60,65 Q80,50 100,65 M60,95 Q80,110 100,95 M50,80 L110,80" stroke="currentColor" strokeOpacity="0.3" strokeWidth="2" />
        
        {/* Electrodes connected by lines */}
        <polyline points="50,60 70,60 80,45" stroke="#4ea1f1" strokeDasharray="4 4" strokeWidth="2.5"/>
        <polyline points="110,100 90,100 80,115" stroke="#4ea1f1" strokeDasharray="4 4" strokeWidth="2.5"/>
        <circle cx="80" cy="45" r="5" fill="#4ea1f1" stroke="none" />
        <circle cx="80" cy="115" r="5" fill="#4ea1f1" stroke="none" />
        
        {/* Waveform signal overlay */}
        <path d="M40,140 L60,140 L75,120 L95,155 L110,140 L130,140" stroke="currentColor" strokeWidth="3" />
      </svg>
    );

    const SvgEEG = (props) => (
      <svg viewBox="0 0 160 160" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {svgbg}
        {/* Brain outline */}
        <path d="M80,30 C50,30 35,50 40,75 C30,85 30,105 45,115 C55,120 65,125 70,120 C75,125 90,125 100,120 C110,120 120,125 125,115 C135,100 135,80 120,70 C125,50 110,30 80,30 Z" fill="currentColor" fillOpacity="0.08" stroke="none" />
        <path d="M80,30 L80,115" stroke="currentColor" strokeOpacity="0.3" strokeDasharray="6 6"/>
        
        {/* Electrode dots */}
        <circle cx="55" cy="55" r="4.5" fill="#4ea1f1" stroke="none" />
        <circle cx="105" cy="55" r="4.5" fill="#4ea1f1" stroke="none" />
        <circle cx="45" cy="90" r="4.5" fill="#4ea1f1" stroke="none" />
        <circle cx="115" cy="90" r="4.5" fill="#4ea1f1" stroke="none" />
        <circle cx="70" cy="75" r="4.5" fill="#4ea1f1" stroke="none" />
        <circle cx="90" cy="75" r="4.5" fill="#4ea1f1" stroke="none" />

        {/* Wave lines across brain */}
        <path d="M35,65 Q50,55 60,65 T85,65" stroke="#4ea1f1" strokeWidth="2.5" />
        <path d="M75,95 Q90,85 100,95 T125,95" stroke="#4ea1f1" strokeWidth="2.5" />
        
        {/* Signal output wave at bottom */}
        <path d="M40,145 L60,145 L70,130 L90,155 L100,145 L120,145" stroke="currentColor" strokeWidth="3" />
      </svg>
    );

    const SvgPES = (props) => (
      <svg viewBox="0 0 160 160" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {svgbg}
        {/* Brain top / Target */}
        <path d="M60,35 C60,20 100,20 100,35 Z" fill="currentColor" fillOpacity="0.08" stroke="none" />
        
        {/* Spine Simple Blocks */}
        <rect x="70" y="55" width="20" height="15" rx="3" fill="currentColor" fillOpacity="0.08" stroke="none" />
        <rect x="70" y="80" width="20" height="15" rx="3" fill="currentColor" fillOpacity="0.08" stroke="none" />
        <rect x="70" y="105" width="20" height="15" rx="3" fill="currentColor" fillOpacity="0.08" stroke="none" />
        <rect x="70" y="130" width="20" height="15" rx="3" fill="currentColor" fillOpacity="0.08" stroke="none" />

        {/* Arrows upward / Signal Flow */}
        <path d="M50,135 L50,50 L63,50" stroke="#4ea1f1" strokeWidth="3" strokeLinecap="square" />
        <polygon points="61,45 70,50 61,55" fill="#4ea1f1" stroke="none" />

        <path d="M110,110 L110,75 L97,75" stroke="#4ea1f1" strokeWidth="3" strokeLinecap="square"/>
        <polygon points="99,70 90,75 99,80" fill="#4ea1f1" stroke="none" />
        
        {/* Stimulus point */}
        <circle cx="50" cy="135" r="5" fill="#4ea1f1" stroke="none" />
        <circle cx="110" cy="110" r="5" fill="#4ea1f1" stroke="none" />
      </svg>
    );

    const SvgPEA = (props) => (
      <svg viewBox="0 0 160 160" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {svgbg}
        {/* Ear Outline */}
        <path d="M70,45 C45,45 40,80 50,105 C60,130 80,105 80,90 C80,70 65,60 60,75" fill="currentColor" fillOpacity="0.08" stroke="none" />
        <path d="M55,65 C50,65 45,75 50,85" stroke="currentColor" strokeOpacity="0.5" />
        
        {/* Sound Waves Entering */}
        <path d="M30,65 C35,70 35,80 30,85" stroke="#4ea1f1" />
        <path d="M20,55 C30,65 30,85 20,95" stroke="#4ea1f1" strokeWidth="3" />
        
        {/* Brain target */}
        <path d="M120,65 C145,65 150,85 135,105 C125,120 110,110 115,95 C120,80 120,75 120,65 Z" fill="currentColor" fillOpacity="0.08" stroke="none" />
        
        {/* Dotted line to brain */}
        <path d="M75,85 L110,85" stroke="currentColor" strokeDasharray="6 6" strokeWidth="3" />
        <polygon points="108,80 115,85 108,90" fill="currentColor" stroke="none" />
      </svg>
    );

    const SvgPEV = (props) => (
      <svg viewBox="0 0 160 160" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {svgbg}
        {/* Eye */}
        <path d="M40,80 Q60,50 80,80 Q60,110 40,80 Z" fill="currentColor" fillOpacity="0.08" stroke="none" />
        <circle cx="60" cy="80" r="7" fill="currentColor" stroke="none" />
        
        {/* Checkerboard Pattern */}
        <g stroke="none" fill="#4ea1f1">
          <rect x="24" y="66" width="7" height="7" />
          <rect x="31" y="73" width="7" height="7" />
          <rect x="24" y="80" width="7" height="7" />
          <rect x="17" y="73" width="7" height="7" />
        </g>
        
        {/* Brain Target */}
        <path d="M125,55 C150,55 150,95 130,110 C120,115 105,105 115,75 Z" fill="currentColor" fillOpacity="0.08" stroke="none" />
        
        {/* Dotted Line */}
        <path d="M80,80 L115,80" stroke="currentColor" strokeDasharray="6 6" strokeWidth="3" />
        <polygon points="113,75 120,80 113,85" fill="currentColor" stroke="none" />
      </svg>
    );

    const SvgERG = (props) => (
      <svg viewBox="0 0 160 160" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {svgbg}
        {/* Eyeball Cross Section */}
        <path d="M110,65 A40,40 0 1,0 110,95 L140,95 L140,65 Z" fill="currentColor" fillOpacity="0.08" stroke="none" />
        {/* Cornea */}
        <path d="M60,45 A30,30 0 0,0 60,115" stroke="currentColor" />
        
        {/* Retina (inner curve on the right) */}
        <path d="M96,48 A30,30 0 0,1 96,112" stroke="#4ea1f1" strokeWidth="5" />
        
        {/* Flash of Light */}
        <circle cx="25" cy="80" r="5" fill="#4ea1f1" stroke="none" />
        <path d="M35,80 L55,80 M25,70 L35,60 M25,90 L35,100" stroke="#4ea1f1" strokeWidth="2.5" />
        
        {/* ERG Waveform overlaying the bottom right */}
        <path d="M70,140 L90,140 L100,120 L115,150 L125,140 L145,140" stroke="currentColor" strokeWidth="3" />
      </svg>
    );

    // --- Icons ---
    const IconPhone = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
    const IconMail = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;
    const IconMapPin = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
    const IconMenu = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
    const IconX = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconCalendar = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconClipboard = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><line x1="9" y1="14" x2="15" y2="14"></line><line x1="9" y1="10" x2="15" y2="10"></line></svg>;
    const IconBrain = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"></path><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"></path></svg>;
    const IconBriefcase = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>;

    // --- UI Components ---
    const SectionTitle = ({ subtitle, title, dark }) => (
      <div className="flex flex-col items-center text-center mb-16">
        <div className="w-12 h-[3px] bg-gold mb-6" />
        {subtitle && <span className="uppercase tracking-[0.2em] text-gold text-sm font-semibold mb-4">{subtitle}</span>}
        <h2 className={`font-serif text-4xl md:text-5xl ${dark ? 'text-white' : 'text-navy'} leading-tight`}>
          {title}
        </h2>
      </div>
    );

    const Button = ({ children, primary, href, className, icon }) => {
      const El = href ? 'a' : 'button';
      return (
        <El
          href={href}
          className={`inline-flex items-center justify-center gap-2 px-8 py-3.5 rounded-full text-sm font-medium tracking-wide uppercase transition-all duration-300 transform hover:-translate-y-0.5
            ${primary 
              ? 'bg-gold text-white hover:bg-gold-light shadow-lg hover:shadow-xl' 
              : 'bg-transparent border border-gold text-gold hover:bg-gold hover:text-white'
            } ${className}`}
        >
          {children}
          {icon && <span className="w-4 h-4">{icon}</span>}
        </El>
      )
    };

    const DividerDown = ({ bg, fg }) => (
      <div className={`w-full h-12 md:h-24 ${bg}`}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className={`w-full h-full ${fg}`}>
          <polygon fill="currentColor" points="0,100 100,0 100,100"/>
        </svg>
      </div>
    );

    const DividerUp = ({ bg, fg }) => (
      <div className={`w-full h-12 md:h-24 ${bg}`}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className={`w-full h-full ${fg}`}>
          <polygon fill="currentColor" points="0,0 100,0 0,100"/>
        </svg>
      </div>
    );

    // --- Main Layout Sections ---
    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const links = [
        { name: 'À propos', href: '#about' },
        { name: 'Examens', href: '#services' },
        { name: 'Contact', href: '#contact' },
        { name: 'Facebook', href: 'https://www.facebook.com/profile.php?id=61562961243949' },
      ];

      return (
        <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-navy/95 glass-nav py-4 shadow-lg' : 'bg-transparent py-6'}`}>
          <div className="max-w-[1200px] mx-auto px-6 lg:px-12 flex justify-between items-center">
            <a href="#" className="flex flex-col group">
              <span className={`font-serif text-2xl lg:text-3xl font-semibold transition-colors text-white`}>
                Dr. Belaid Mayada
              </span>
              <span className={`text-xs font-medium uppercase tracking-widest ${scrolled ? 'text-gold' : 'text-gold/80'} group-hover:text-gold transition-colors mt-0.5`}>
                Neurophysiologie Clinique
              </span>
            </a>

            <div className="hidden md:flex items-center gap-8 text-sm font-medium uppercase tracking-wider text-white">
              {links.map((link) => (
                <a key={link.name} href={link.href} className="hover:text-gold transition-colors">{link.name}</a>
              ))}
              <a href="tel:0556458160" className="bg-gold hover:bg-gold-light text-white px-6 py-2.5 rounded-full transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                Appeler
              </a>
            </div>

            <button className="md:hidden text-white p-2" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
              {mobileMenuOpen ? <IconX className="w-6 h-6"/> : <IconMenu className="w-6 h-6"/>}
            </button>
          </div>

          <AnimatePresence>
            {mobileMenuOpen && (
              <motion.div 
                initial={{ opacity: 0, height: 0 }}
                animate={{ opacity: 1, height: 'auto' }}
                exit={{ opacity: 0, height: 0 }}
                className="md:hidden bg-navy-dark border-t border-white/10 overflow-hidden"
              >
                <div className="flex flex-col p-6 gap-4 text-white uppercase text-sm tracking-wider">
                  {links.map((link) => (
                    <a key={link.name} href={link.href} onClick={() => setMobileMenuOpen(false)} className="py-2 hover:text-gold">{link.name}</a>
                  ))}
                  <a href="tel:0556458160" className="bg-gold text-white py-3 rounded text-center mt-4 tracking-wider">Appeler Maintenant</a>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </nav>
      );
    };

    const Hero = () => {
      const fadeUp = {
        hidden: { opacity: 0, y: 30 },
        show: { opacity: 1, y: 0, transition: { duration: 0.8, ease: "easeOut" } }
      };

      return (
        <section className="relative min-h-screen bg-navy flex items-center pt-24 overflow-hidden">
          {/* Background Pattern */}
          <div className="absolute inset-0 z-0">
             <svg className="w-full h-full object-cover opacity-5 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <pattern id="neural" width="100" height="100" patternUnits="userSpaceOnUse">
                  <circle cx="20" cy="20" r="2" fill="#fff" />
                  <circle cx="80" cy="40" r="2" fill="#fff" />
                  <circle cx="40" cy="80" r="2" fill="#fff" />
                  <line x1="20" y1="20" x2="80" y2="40" stroke="#fff" strokeWidth="0.5" />
                  <line x1="80" y1="40" x2="40" y2="80" stroke="#fff" strokeWidth="0.5" />
                  <line x1="40" y1="80" x2="20" y2="20" stroke="#fff" strokeWidth="0.5" />
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#neural)" />
            </svg>
          </div>

          <div className="max-w-[1200px] mx-auto px-6 lg:px-12 relative z-10 w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center pb-20">
            <motion.div initial="hidden" animate="show" transition={{ staggerChildren: 0.2 }} className="text-white pt-12 lg:pt-0">
              <motion.div variants={fadeUp} className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-sm font-medium tracking-wide uppercase mb-8">
                <span className="w-1.5 h-1.5 rounded-full bg-gold"></span>
                Batna, Algérie
              </motion.div>
              <motion.h1 variants={fadeUp} className="font-serif text-5xl md:text-6xl lg:text-7xl font-semibold leading-[1.1] mb-6">
                Dr. Belaid <br/><span className="text-gold">Mayada</span>
              </motion.h1>
              <motion.h2 variants={fadeUp} className="text-xl md:text-2xl text-gold-light mb-8 font-serif italic">
                Neurophysiologie Clinique & Exploration Fonctionnelle
              </motion.h2>
              <motion.p variants={fadeUp} className="text-lg text-white/80 max-w-xl mb-10 leading-[1.85] font-light">
                Un cabinet spécialisé offrant des examens approfondis du système nerveux, avec un rapport complet et précis pour guider efficacement votre médecin traitant.
              </motion.p>
              
              <motion.div variants={fadeUp} className="flex flex-wrap gap-4 mb-16">
                <Button primary href="tel:0556458160" icon={<IconPhone className="w-4 h-4"/>}>Appeler</Button>
                <Button href="https://wa.me/213556458160" className="border-green-500 text-green-400 hover:bg-green-500 hover:text-white">WhatsApp</Button>
              </motion.div>

              <motion.div variants={fadeUp} className="grid grid-cols-3 gap-6 pt-8 border-t border-white/10">
                <div>
                  <div className="text-gold font-serif text-2xl font-semibold mb-1">6</div>
                  <div className="text-xs uppercase tracking-wider text-white/60">Examens</div>
                </div>
                <div>
                  <div className="text-gold font-serif text-2xl font-semibold mb-1">Sur</div>
                  <div className="text-xs uppercase tracking-wider text-white/60">Rendez-vous</div>
                </div>
                <div>
                  <div className="text-gold font-serif text-2xl font-semibold mb-1">Batna</div>
                  <div className="text-xs uppercase tracking-wider text-white/60">Vue Maps</div>
                </div>
              </motion.div>
            </motion.div>

            {/* Illustration */}
            <motion.div 
              initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 1.5, delay: 0.5 }}
              className="relative w-full max-w-md mx-auto hidden lg:flex items-center justify-center p-8"
